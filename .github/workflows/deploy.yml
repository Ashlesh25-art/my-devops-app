name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: 13.233.73.225
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd ~/myapp
          git pull
          docker stop myapp || true
          docker rm myapp || true
          docker build -t myapp .
          docker run -d -p 3000:3000 myapp
